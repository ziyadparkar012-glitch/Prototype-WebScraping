<!DOCTYPE html>
<html>
<head>
    <title>Property Report Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            padding: 20px;
            color: #333;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
        }

        form {
            margin-top: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <h1>Property Intelligence Report</h1>
    <p>Enter a property address to generate a PDF report.</p>

    <form action="/generate-report" method="post">
        <input
            type="text"
            name="address"
            placeholder="Enter property address"
            required
        />
        <button type="submit">Generate PDF</button>
    </form>
</body>
</html>
